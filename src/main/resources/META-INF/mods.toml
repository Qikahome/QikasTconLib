modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# JEI（Just Enough Items）依赖 - 可选依赖
[[dependencies.${mod_id}]]
    modId="jei"
    mandatory=false
    versionRange="${jei_range}"
    ordering="NONE"
    side="BOTH"

# Mantle 核心库依赖 - 可选依赖
[[dependencies.${mod_id}]]
    modId="mantle"
    mandatory=false
    versionRange="${mantle_range}"
    ordering="BEFORE"
    side="BOTH"

# 匠魂（Tinkers' Construct）依赖 - 可选依赖
[[dependencies.${mod_id}]]
    modId="tconstruct"
    mandatory=false
    versionRange="${tconstruct_range}"
    ordering="AFTER"
    side="BOTH"